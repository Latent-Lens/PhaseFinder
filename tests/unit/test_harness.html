<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PhaseFinder Unit Test Harness</title>
  <!--
    Minimal page that imports the app's ES modules (with the same vendored-library
    import map as index.html) and re-exposes the functions the Python unit test
    modules call via page.evaluate(). Assigning them to window makes them available
    as bare globals too, so the existing test snippets keep working. No app UI is
    rendered; the modules' top-level querySelector captures simply resolve to null.
  -->
  <script type="importmap">
    {
      "imports": {
        "d3": "/js/vendor/d3.min.js",
        "ml-levenberg-marquardt": "/js/vendor/ml-levenberg-marquardt.js",
        "ml-gsd": "/js/vendor/ml-gsd.js"
      }
    }
  </script>
  <script type="module">
    import { FCSParser } from "/js/fcs/parser.js";
    import { PhaseFinderFrame, make_frame, concat_frames, build_metadata_frame_from_records } from "/js/data_structs/metadata_frame.js";
    import { metadata_field_from_label, normalize_metadata_columns } from "/js/data_structs/metadata_columns.js";
    import { split_filename_metadata, parse_fixed_breaks } from "/js/ui/metadata_wizard.js";
    import { guess_annotations_from_filename, timepoint_sort_value, annotation_input_size } from "/js/ui/table_support.js";
    import { display_name, metadata_filename_key } from "/js/util/names.js";
    import { parse_delimited_metadata, find_metadata_filename_column, loaded_file_index_by_metadata_key } from "/js/io/metadata_io.js";
    import { parameter_map, find_param_index, unique_indexes } from "/js/io/parameter_map.js";
    import { find_auxiliary_indexes_for_file, filter_selected_channel_values } from "/js/fcs/channel_cleaning.js";
    import { serialize_session, parse_session_toml } from "/js/session/toml_io.js";
    import * as DJF from "/js/analysis/djf.js";

    Object.assign(window, {
      FCSParser, PhaseFinderFrame, make_frame, concat_frames, build_metadata_frame_from_records,
      metadata_field_from_label, normalize_metadata_columns,
      split_filename_metadata, parse_fixed_breaks,
      guess_annotations_from_filename, timepoint_sort_value, annotation_input_size,
      display_name, metadata_filename_key,
      parse_delimited_metadata, find_metadata_filename_column, loaded_file_index_by_metadata_key,
      parameter_map, find_param_index, unique_indexes,
      find_auxiliary_indexes_for_file, filter_selected_channel_values,
      serialize_session, parse_session_toml,
    });
    // DJF (and its statically imported ml-* stack) is loaded eagerly here so the
    // unit tests can call window.PhaseFinder.djf.* synchronously.
    window.PhaseFinder = { djf: DJF };
    window.__libsReady = true;
  </script>

  <script>
    // ---------------------------------------------------------------------------
    // Test utilities — helpers used by the Python unit test modules via evaluate()
    // ---------------------------------------------------------------------------
    window.TestUtils = {

      /**
       * Build a minimal but fully valid FCS3.1 ArrayBuffer with 6 parameters
       * (GFP/FITC-A through mCherry/PE-W) and `events` synthetic events.
       * Mirrors the Python write_synthetic_fcs() format exactly.
       */
      buildSyntheticFCS: function(events) {
        events = events || 6000;
        const paramNames = [
          "GFP/FITC-A", "GFP/FITC-H", "GFP/FITC-W",
          "mCherry/PE-A", "mCherry/PE-H", "mCherry/PE-W",
        ];
        const numParams = paramNames.length;
        const dataSize = events * numParams * 4; // float32 per value

        // Build raw data bytes (little-endian float32 values, G1-ish around 64000)
        const dataBuffer = new ArrayBuffer(dataSize);
        const dataView = new DataView(dataBuffer);
        for (let i = 0; i < events * numParams; i++) {
          // Simple bimodal: 10% at ~128000, rest at ~64000
          const val = (i % 10 === 0) ? 128000 + (Math.random() - 0.5) * 14000
                                      : 64000 + (Math.random() - 0.5) * 9000;
          dataView.setFloat32(i * 4, Math.max(1000, val), true);
        }

        // Build TEXT key/value pairs
        const pairs = [
          "$BEGINANALYSIS", "0", "$ENDANALYSIS", "0",
          "$BYTEORD", "1,2,3,4", "$DATATYPE", "F", "$MODE", "L",
          "$NEXTDATA", "0", "$PAR", String(numParams), "$TOT", String(events),
        ];
        paramNames.forEach((name, idx) => {
          const p = idx + 1;
          pairs.push(`$P${p}B`, "32", `$P${p}E`, "0,0", `$P${p}N`, name,
                     `$P${p}R`, "262144", `$P${p}S`, name);
        });

        // Iterate to find stable BEGINDATA / ENDDATA offsets
        const textBegin = 58;
        let dataBegin = 0, dataEnd = 0;
        let textBytes;
        for (let iter = 0; iter < 20; iter++) {
          const tokens = [...pairs, "$BEGINDATA", String(dataBegin), "$ENDDATA", String(dataEnd)];
          const text = "|" + tokens.join("|") + "|";
          textBytes = new TextEncoder().encode(text);
          const textEnd = textBegin + textBytes.length - 1;
          const nextDataBegin = textEnd + 1;
          const nextDataEnd = nextDataBegin + dataSize - 1;
          if (nextDataBegin === dataBegin && nextDataEnd === dataEnd) break;
          dataBegin = nextDataBegin;
          dataEnd = nextDataEnd;
        }

        const textEnd = textBegin + textBytes.length - 1;

        // Build the 58-byte header
        function pad8(n) { return String(n).padStart(8, " "); }
        const headerStr = "FCS3.1    " + pad8(textBegin) + pad8(textEnd)
                        + pad8(dataBegin) + pad8(dataEnd) + pad8(0) + pad8(0);
        const headerBytes = new TextEncoder().encode(headerStr);

        // Assemble: header + text + data
        const total = 58 + textBytes.length + dataSize;
        const buf = new ArrayBuffer(total);
        const view = new Uint8Array(buf);
        view.set(new Uint8Array(headerBytes.buffer).subarray(0, 58), 0);
        view.set(textBytes, 58);
        view.set(new Uint8Array(dataBuffer), 58 + textBytes.length);
        return buf;
      },

      /**
       * Build a minimal FCS3.1 ArrayBuffer with 2 integer ($DATATYPE I,
       * 16-bit) parameters and deterministic per-event values, so the
       * integer data-reading path (untested by buildSyntheticFCS, which is
       * always $DATATYPE F) can be exercised with exact expected values.
       * Param "Chan-A" = index*100; param "Chan-B" = 65535 - index*100.
       */
      buildSyntheticIntegerFCS: function(events) {
        events = events || 10;
        const paramNames = ["Chan-A", "Chan-B"];
        const numParams = paramNames.length;
        const dataSize = events * numParams * 2; // uint16 per value

        const dataBuffer = new ArrayBuffer(dataSize);
        const dataView = new DataView(dataBuffer);
        for (let i = 0; i < events; i++) {
          dataView.setUint16(i * numParams * 2, (i * 100) % 65536, true);
          dataView.setUint16(i * numParams * 2 + 2, 65535 - ((i * 100) % 65536), true);
        }

        const pairs = [
          "$BEGINANALYSIS", "0", "$ENDANALYSIS", "0",
          "$BYTEORD", "1,2,3,4", "$DATATYPE", "I", "$MODE", "L",
          "$NEXTDATA", "0", "$PAR", String(numParams), "$TOT", String(events),
        ];
        paramNames.forEach((name, idx) => {
          const p = idx + 1;
          pairs.push(`$P${p}B`, "16", `$P${p}E`, "0,0", `$P${p}N`, name,
                     `$P${p}R`, "65536", `$P${p}S`, name);
        });

        const textBegin = 58;
        let dataBegin = 0, dataEnd = 0;
        let textBytes;
        for (let iter = 0; iter < 20; iter++) {
          const tokens = [...pairs, "$BEGINDATA", String(dataBegin), "$ENDDATA", String(dataEnd)];
          const text = "|" + tokens.join("|") + "|";
          textBytes = new TextEncoder().encode(text);
          const textEnd = textBegin + textBytes.length - 1;
          const nextDataBegin = textEnd + 1;
          const nextDataEnd = nextDataBegin + dataSize - 1;
          if (nextDataBegin === dataBegin && nextDataEnd === dataEnd) break;
          dataBegin = nextDataBegin;
          dataEnd = nextDataEnd;
        }

        const textEnd = textBegin + textBytes.length - 1;
        function pad8(n) { return String(n).padStart(8, " "); }
        const headerStr = "FCS3.1    " + pad8(textBegin) + pad8(textEnd)
                        + pad8(dataBegin) + pad8(dataEnd) + pad8(0) + pad8(0);
        const headerBytes = new TextEncoder().encode(headerStr);

        const total = 58 + textBytes.length + dataSize;
        const buf = new ArrayBuffer(total);
        const view = new Uint8Array(buf);
        view.set(new Uint8Array(headerBytes.buffer).subarray(0, 58), 0);
        view.set(textBytes, 58);
        view.set(new Uint8Array(dataBuffer), 58 + textBytes.length);
        return buf;
      },

      /**
       * Build a synthetic bimodal histogram suitable for PhaseFinderDJF.fit().
       * Two Gaussian peaks: G1 at ~64000 (height 800) and G2 at ~128000 (height 400).
       */
      buildBimodalHistogram: function(bins) {
        bins = bins || 256;
        const lo = 20000, hi = 200000;
        const width = (hi - lo) / bins;
        const points = [];
        for (let i = 0; i < bins; i++) {
          const x = lo + (i + 0.5) * width;
          const g1 = Math.exp(-0.5 * Math.pow((x - 64000) / 4500, 2)) * 800;
          const g2 = Math.exp(-0.5 * Math.pow((x - 128000) / 6000, 2)) * 400;
          const s  = Math.max(0, 60 - Math.abs(x - 96000) / 1500);
          points.push({ x: x, y: g1 + g2 + s });
        }
        return points;
      },
    };
  </script>
</head>
<body>
  <p style="font-family:sans-serif;color:#666">
    PhaseFinder Unit Test Harness — driven by Playwright, not for manual use.
  </p>
</body>
</html>
