<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="PhaseFinder: A browser-based tool for inspecting and plotting flow cytometry FCS files with Dean-Jett-Fox cell-cycle modeling." />
    <title>PhaseFinder</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script type="module">
      // Levenberg–Marquardt solver for Dean–Jett–Fox curve fitting. Loaded
      // dynamically (and ready well before the user triggers a fit) so a load
      // failure or export-shape change can't throw at parse time.
      import("https://esm.sh/ml-levenberg-marquardt@4")
        .then((mod) => {
          window.levenbergMarquardt = mod.default || mod.levenbergMarquardt || mod;
        })
        .catch((error) => console.warn("Levenberg–Marquardt failed to load:", error));
      // ml-gsd peak finder, used to seed the DJF fit by locating the G1/G2 peaks.
      import("https://esm.sh/ml-gsd@13")
        .then((mod) => {
          window.gsd = mod.gsd || mod.default || mod;
        })
        .catch((error) => console.warn("ml-gsd failed to load:", error));
    </script>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/sidebar.css" />
    <link rel="stylesheet" href="./css/table.css" />
    <link rel="stylesheet" href="./css/plot.css" />
    <link rel="stylesheet" href="./css/feedback.css" />
    <link rel="stylesheet" href="./css/responsive.css" />

    <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicon/favicon-16x16.png">
    <link rel="manifest" href="/assets/img/favicon/site.webmanifest">
  </head>
  <body>
    <header class="page-header">
      <img id="siteLogo" class="site-logo" src="./assets/img/logo.png" alt="PhaseFinder" data-title-key="reloadLogo" />
      <div class="header-actions">
        <button
          id="restartButton"
          class="restart-button"
          type="button"
          data-title-key="restart"
        >
          Restart
        </button>
      </div>
    </header>

    <main class="app">
      <aside id="sidebar" class="sidebar panel">
        <div class="sidebar-header panel-title">
          <div class="sidebar-title-row">
            <h2>FCS Files</h2>
            <button id="sidebarToggle" class="sidebar-toggle quick-tooltip" type="button" aria-controls="sidebarContent" aria-expanded="true" data-tooltip-key="sidebarCollapse" aria-label="Collapse sidebar">
              <img id="sidebarToggleIcon" class="sidebar-toggle-icon" src="./assets/img/sidepanel_close.svg" alt="" aria-hidden="true" />
            </button>
          </div>
          <div class="panel-title-rule"></div>
        </div>
        <div id="sidebarContent" class="sidebar-content">
          <section class="sidebar-section">
            <div id="dropZone" class="drop-zone">
              <div>
                <strong id="dropZoneTitle">Drop FCS files here</strong>
                <span id="dropZoneHint">or click to choose files from disk</span>
              </div>
            </div>
          </section>

          <section class="sidebar-section controls">
            <div>
              <label for="dnaAreaSelect">Select channel</label>
              <select id="dnaAreaSelect"></select>
            </div>
            <p id="status" class="status">No files loaded.</p>
            <button
              id="startAnalysisButton"
              class="start-analysis-button sidebar-plot-button quick-tooltip"
              type="button"
              data-tooltip-key="plotChannelEventsRequirements"
              disabled
            >
              Plot Channel Events
            </button>
          </section>
        </div>
        <input id="fileInput" class="visually-hidden-file" type="file" accept=".fcs" multiple />
        <div class="sidebar-collapsed-actions">
          <button id="collapsedUploadTarget" class="sidebar-collapsed-upload-target quick-tooltip" type="button" data-tooltip-key="uploadFiles" aria-label="Drop FCS files here or click to choose files from disk">
            <img class="sidebar-collapsed-upload-icon" src="./assets/img/file_upload.svg" alt="" aria-hidden="true" />
          </button>
          <div class="sidebar-collapsed-channel-control quick-tooltip" data-tooltip-key="selectChannel">
            <img class="sidebar-collapsed-checklist-icon" src="./assets/img/checklist.svg" alt="" aria-hidden="true" />
            <select id="collapsedDnaAreaSelect" class="sidebar-collapsed-channel-select" aria-label="Select channel"></select>
          </div>
          <button id="collapsedPlotButton" class="sidebar-collapsed-plot-button quick-tooltip" type="button" data-tooltip-key="plotChannelEvents" aria-label="Plot channel events" disabled>
            <img class="sidebar-collapsed-histogram-icon" src="./assets/img/histogram.svg" alt="" aria-hidden="true" />
          </button>
        </div>
      </aside>

      <section class="workspace">
        <section id="plotPanel" class="panel parsed-files-panel plot-panel" hidden>
          <div class="panel-title">
            <span class="metadata-title-row"><span class="metadata-title-text" id="plotTitle">Histogram of Events</span></span>
            <span class="panel-title-rule"></span>
          </div>
          <div class="metadata-panel-body">
            <div class="plot-controls">
              <label class="plot-control">Color by
                <select id="plotColorBy">
                  <option value="file">File</option>
                  <option value="strain">Strain</option>
                </select>
              </label>
              <label class="plot-control">Bins
                <input id="plotBins" type="number" min="16" max="1024" step="16" value="512" />
              </label>
              <label class="plot-control plot-control-check">
                <span class="plot-check-row">
                  <input type="checkbox" id="plotDebrisCorrection" />
                  Remove debris/background
                  <span
                    class="info-icon"
                    tabindex="0"
                    role="img"
                    aria-label="Debris and background correction help"
                    data-tooltip-key="debrisHelp"
                  >?</span>
                </span>
              </label>
              <label class="plot-control plot-control-check">
                <span class="plot-check-row">
                  <input type="checkbox" id="plotDoubletCorrection" />
                  Remove aggregates/doublets
                  <span
                    class="info-icon"
                    tabindex="0"
                    role="img"
                    aria-label="Aggregate and doublet correction help"
                    data-tooltip-key="doubletHelp"
                  >?</span>
                </span>
              </label>
              <label class="plot-control plot-control-check">
                <span class="plot-check-row">
                  <input type="checkbox" id="plotThresholdToggle" />
                  Peak threshold
                  <span
                    class="info-icon"
                    tabindex="0"
                    role="img"
                    aria-label="Peak threshold help"
                    data-tooltip-key="peakThresholdHelp"
                  >?</span>
                </span>
              </label>
              <span id="djfReadout" class="djf-readout"></span>
            </div>
            <div id="plotArea" class="table-wrap"></div>
          </div>
        </section>

        <section id="metadataPanel" class="panel parsed-files-panel">
          <div class="panel-title metadata-title">
            <div class="metadata-title-row">
              <span class="metadata-title-text">Table of Loaded FCS Samples</span>
              <button id="metadataPanelToggle" class="panel-icon-toggle quick-tooltip" type="button" aria-expanded="true" aria-controls="metadataPanelBody" data-tooltip-key="tableCollapse" aria-label="Collapse table">
                <img id="metadataPanelToggleIcon" class="panel-toggle-icon" src="./assets/img/table_minimize.svg" alt="" aria-hidden="true" />
              </button>
            </div>
            <span class="panel-title-rule"></span>
          </div>
          <div id="metadataPanelBody" class="metadata-panel-body">
            <div id="fileTable" class="table-wrap"></div>
          </div>
        </section>
      </section>
    </main>

    <div id="progressOverlay" class="progress-overlay" hidden aria-live="polite" aria-busy="false">
      <div class="progress-card" role="status">
        <div class="progress-track" aria-hidden="true">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <div class="progress-meta">
          <span id="progressLabel">Loading FCS Metadata</span>
          <span id="progressPercent">0%</span>
        </div>
        <div id="progressDetail" class="progress-detail"></div>
      </div>
    </div>

    <footer id="statusBar" class="status-bar">
      <span id="statusBarMessage" class="status-bar-message">Ready.</span>
      <span class="status-bar-copyright">
        © 2026 <a href="https://latentlens.org">LatentLens</a>. All rights reserved
      </span>
    </footer>

    <script src="./js/fcs-parser.js"></script>
    <script src="./js/hover_text.js"></script>
    <script src="./js/ui_controls.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/djf_gpt.js"></script>
    <script src="./js/plotting.js"></script>
    <script src="./js/analysis.js"></script>
  </body>
</html>
